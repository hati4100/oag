# Impossible Claims Pattern Database for Hallucination Detection
#
# Each category contains patterns that match factually impossible statements.
# Patterns use two modes:
#   - contains: plain text substring match (fast, via Aho-Corasick)
#   - regex: anchored regex match (for structured patterns like version numbers)
#
# Categories:
#   versions   — nonexistent software versions
#   models     — nonexistent AI model names or versions
#   dates      — impossible dates or temporal claims
#   standards  — nonexistent RFC/standard numbers or versions
#   geography  — impossible geographic claims
#   science    — impossible scientific claims
#   companies  — impossible corporate claims
#   urls       — commonly hallucinated URL structures

versions:
  contains:
    # Python versions that don't exist
    - "Python 4."
    - "Python 3.20"
    - "Python 3.19"
    - "Python 3.18"
    - "Python 3.17"
    - "Python 3.16"
    - "Python 3.15"
    - "Python 2.8"
    - "Python 2.9"
    # Java versions that don't exist (as of 2026)
