    - "Java 27"
    - "Java 28"
    - "Java 29"
    - "Java 30"
    # Node.js versions that don't exist
    - "Node.js 25"
    - "Node.js 26"
    - "Node.js 27"
    - "Node.js 28"
    - "Node.js 29"
    - "Node.js 30"
    - "Node 25"
    - "Node 26"
    - "Node 27"
    # Go versions that don't exist
    - "Go 1.30"
    - "Go 1.29"
    - "Go 1.28"
    - "Go 1.27"
    - "Go 2."
    # Rust versions that don't exist
