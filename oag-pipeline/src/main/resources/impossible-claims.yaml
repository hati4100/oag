    - "HTTP 219"
    - "HTTP 309"
    - "HTTP 310"
    - "HTTP 430"
    - "HTTP 460"
    - "HTTP 509"
    - "HTTP 520"
    - "HTTP 530"
    # Nonexistent well-known RFCs (using ranges known to be unassigned)
    - "RFC 99999"
    - "RFC 88888"
    # Nonexistent ISO standards
    - "ISO 99999"
    - "ISO 88888"
    # Nonexistent IEEE standards
    - "IEEE 802.99"
    - "IEEE 802.88"

