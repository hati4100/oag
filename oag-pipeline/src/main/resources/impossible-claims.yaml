dates:
  contains:
    # Months that don't exist
    - "13th month"
    - "14th month"
    # Impossible day counts
    - "February 30"
    - "February 31"
    - "April 31"
    - "June 31"
    - "September 31"
    - "November 31"
    # Far future claims presented as fact
    - "was released in 2030"
    - "was released in 2031"
    - "was released in 2032"
    - "launched in 2030"
    - "launched in 2031"
    - "launched in 2032"
    - "published in 2030"
    - "published in 2031"
    - "since 2030"
    - "since 2031"
    - "introduced in 2030"
    - "introduced in 2031"

  regex:
    # February 30/31 in date formats
    - "02[/-]3[01][/-]"
    - "2\\d{3}[/-]02[/-]3[01]"
    # April/June/Sept/Nov 31 in date formats
    - "(?:04|06|09|11)[/-]31[/-]"

standards:
  contains:
