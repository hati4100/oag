    - "SSL 4.0"
    # HTTP
    - "HTTP/3.1"
    - "HTTP/4"
    - "HTTP/4.0"

  regex:
    # Semantic version patterns for known ranges
    - "Python 3\\.1[5-9]\\."
    - "Node(?:\\.js)? v?2[5-9]\\."
    - "Go 1\\.2[7-9]\\."

